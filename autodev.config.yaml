# AutoDev Configuration
# Copy this file and customize for your project.
# Secrets (API keys, bot tokens) go in .env — never in this file.

repo: owner/repo-name

issues:
  filter:
    labels: ["autodev"]
    # milestone: "v2.0"  # Optional
  max_questions_per_issue: 5

reviewer:
  type: codex          # "codex" or "claude"
  max_iterations: 3

git:
  branch_prefix: autodev
  commit_co_author: "AutoDev Bot <autodev@local>"
  pr_template: |
    ## Summary
    {summary}

    Closes #{issue_number}

    ---
    *Generated by AutoDev*

telegram:
  chat_id: "YOUR_CHAT_ID"
  escalation_timeout_minutes: 240
  reminder_interval_minutes: 60

logging:
  level: info
  dir: ./logs

executor:
  allowed_tools:
    - Read
    - Edit
    - Write
    - Bash
    - Glob
    - Grep
  working_directory: "."
